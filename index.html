<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#2c5f8a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.svg">
<title>Frontier Work Order</title>
<style>
  :root{--ink:#16242f;--accent:#2c5f8a;--line:#d4dbe2;--bg:#eef2f5;--ok:#1d6b3a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:16px;}
  header{background:var(--accent);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:5;}
  header h1{margin:0;font-size:17px;}
  header .sub{font-size:12.5px;opacity:.9;margin-top:2px;}
  .wrap{max-width:640px;margin:0 auto;padding:14px 14px 40px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin:12px 0;}
  .card h2{margin:0 0 10px;font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:.4px;}
  .req dt{font-size:11.5px;color:#6b7a88;font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-top:8px;}
  .req dd{margin:1px 0 0;font-size:15px;}
  .req .pri{display:inline-block;padding:2px 9px;border-radius:20px;font-size:13px;font-weight:700;color:#fff;background:#888;}
  .pri.Emergency{background:#c0392b;}.pri.High{background:#e07b1a;}.pri.Medium{background:#2c5f8a;}.pri.Low{background:#5a8f3c;}
  label{display:block;font-size:12.5px;font-weight:600;margin:12px 0 4px;}
  input,textarea,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;}
  textarea{min-height:96px;line-height:1.4;resize:vertical;}
  table.sup{width:100%;border-collapse:collapse;margin-top:6px;font-size:13px;}
  table.sup th{font-size:11px;color:#6b7a88;text-align:left;padding:4px;}
  table.sup td{padding:2px;}
  table.sup input{padding:8px;font-size:14px;}
  .addrow{background:#fff;color:var(--accent);border:1px dashed var(--accent);border-radius:8px;padding:8px;width:100%;font-weight:600;margin-top:6px;}
  .row2{display:flex;gap:10px;}.row2>div{flex:1;}
  .sig-wrap{border:1px solid var(--line);border-radius:8px;background:#fcfdfe;}
  canvas.sig{width:100%;height:130px;display:block;touch-action:none;border-radius:8px;}
  .sig-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-top:1px dashed var(--line);font-size:12.5px;color:#6b7a88;}
  .sig-bar button{background:none;border:0;color:var(--accent);font-weight:700;font-size:13px;}
  .chk{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:14px;}
  .chk input{width:auto;}
  #sendBtn{width:100%;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:16px;font-size:17px;font-weight:700;margin-top:18px;}
  #sendBtn:disabled{opacity:.6;}
  #msg{margin-top:12px;padding:12px;border-radius:8px;font-size:14px;display:none;}
  #msg.ok{display:block;background:#e6f3ea;color:var(--ok);border:1px solid #b6dcc2;}
  #msg.err{display:block;background:#fde8e8;color:#9b1c1c;border:1px solid #f3c2c2;}
  #msg.info{display:block;background:#eaf1f7;color:#27506f;border:1px solid #c2d6e6;}
  #pdfHost{position:absolute;left:-99999px;top:0;}
  .nodata{background:#fdf3e0;color:#8a5a12;border:1px solid #f0d9ad;border-radius:8px;padding:10px;font-size:13.5px;}
</style>
</head>
<body>
<header>
  <h1>Frontier Housing — Work Order</h1>
  <div class="sub" id="hdrsub">Maintenance completion form</div>
</header>
<div class="wrap">

  <div class="card req" id="reqCard">
    <h2>Request</h2>
    <div id="reqBody"></div>
  </div>

  <div class="card">
    <h2>Work performed</h2>
    <label>Completed by</label>
    <input type="text" id="completedBy" placeholder="Your name">
    <label>Description of work done</label>
    <textarea id="workDone" placeholder="What you did to resolve it…"></textarea>
  </div>

  <div class="card">
    <h2>Supplies / parts used</h2>
    <table class="sup">
      <thead><tr><th>Date</th><th>Material / part</th><th>Unit $</th><th>Qty</th><th>Left</th></tr></thead>
      <tbody id="supBody"></tbody>
    </table>
    <button type="button" class="addrow" id="addRow">+ Add a row</button>
  </div>

  <div class="card">
    <h2>Times</h2>
    <div class="row2">
      <div><label>Date/time started</label><input type="text" id="started" placeholder="MM/DD/YYYY h:mm"></div>
      <div><label>Date/time completed</label><input type="text" id="completed" placeholder="MM/DD/YYYY h:mm"></div>
    </div>
    <label>Follow-up appointment (if any)</label>
    <input type="text" id="followup">
  </div>

  <div class="card">
    <h2>Signatures</h2>
    <label>Maintenance signature</label>
    <div class="sig-wrap"><canvas class="sig" id="sigMaint"></canvas>
      <div class="sig-bar"><span>Sign above</span><button type="button" data-clear="sigMaint">Clear</button></div></div>
    <div class="chk"><input type="checkbox" id="tenantUnavail"><label for="tenantUnavail" style="margin:0;font-weight:600;">Tenant unavailable</label></div>
    <div id="tenantSigWrap"><label>Tenant signature</label>
      <div class="sig-wrap"><canvas class="sig" id="sigTenant"></canvas>
        <div class="sig-bar"><span>Sign above</span><button type="button" data-clear="sigTenant">Clear</button></div></div></div>
  </div>

  <button id="sendBtn">Complete &amp; Send</button>
  <div id="msg"></div>
</div>

<div id="pdfHost"></div>

<script src="html2pdf.bundle.min.js"></script>
<script>
// ====== CONFIG ======
const WEB3FORMS_KEY = "22dc999f-0cf0-4153-9f9d-82afb8ebcde0";  // tied to propertymanager@frontierhousingcorporation.com
const OFFICE_EMAIL  = "propertymanager@frontierhousingcorporation.com";
// ====================

function decodeWO(s){ try{ return JSON.parse(decodeURIComponent(escape(atob(s)))); }catch(e){ return null; } }
const m = location.hash.match(/wo=([^&]+)/);
const REQ = m ? decodeWO(m[1]) : null;

// ---- render request summary ----
(function(){
  const body=document.getElementById('reqBody');
  if(!REQ){ document.getElementById('reqCard').innerHTML='<div class="nodata">No work-order data found in this link. Open the link the office sent you, or this is just a preview.</div>'; document.getElementById('hdrsub').textContent='Preview (no request loaded)'; return; }
  if(REQ.woNum) document.getElementById('hdrsub').textContent='WO #'+REQ.woNum+(REQ.complexUnit?(' · '+REQ.complexUnit):'');
  else if(REQ.complexUnit) document.getElementById('hdrsub').textContent=REQ.complexUnit;
  const F=[['Occupant','occName'],['Complex / Unit','complexUnit'],['Client phone','clientPhone'],['Date notified','dateNotified'],['Special information','specialInfo'],['Pet in residence','pet'],['Enter in absence','entryAuth'],['By appointment','byAppt'],['Appointment','apptDateTime'],['Date reported','dateReported'],['Date assigned','dateAssigned']];
  let h='';
  if(REQ.priority) h+='<dt>Priority</dt><dd><span class="pri '+REQ.priority.split(' ')[0]+'">'+REQ.priority+'</span></dd>';
  if(REQ.workRequested) h+='<dt>Work requested</dt><dd><b>'+esc(REQ.workRequested)+'</b></dd>';
  if(REQ.workDeadline) h+='<dt>Deadline</dt><dd>'+esc(REQ.workDeadline)+'</dd>';
  F.forEach(([lbl,k])=>{ if(REQ[k]) h+='<dt>'+lbl+'</dt><dd>'+esc(REQ[k])+'</dd>'; });
  body.innerHTML=h;
})();
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ---- supplies rows ----
function addRow(){
  const tr=document.createElement('tr');
  tr.innerHTML='<td><input type="text"></td><td><input type="text"></td><td><input type="text" inputmode="decimal"></td><td><input type="text" inputmode="numeric"></td><td><input type="text"></td>';
  document.getElementById('supBody').appendChild(tr);
}
addRow();addRow();
document.getElementById('addRow').addEventListener('click',addRow);
function readSupplies(){
  const rows=[];
  document.querySelectorAll('#supBody tr').forEach(tr=>{
    const c=[...tr.querySelectorAll('input')].map(i=>i.value.trim());
    if(c.some(v=>v)) rows.push({date:c[0],item:c[1],price:c[2],qty:c[3],left:c[4]});
  });
  return rows;
}

// ---- signature pads ----
function makePad(canvas){
  const ctx=canvas.getContext('2d');let drawing=false,last=null,dpr=window.devicePixelRatio||1;
  function resize(){const r=canvas.getBoundingClientRect();canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.scale(dpr,dpr);ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#10243a';canvas._ink=false;}
  function pos(e){const r=canvas.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
  function start(e){drawing=true;last=pos(e);e.preventDefault();}
  function move(e){if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;canvas._ink=true;e.preventDefault();}
  function end(){drawing=false;}
  canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
  canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
  return {clear(){const w=canvas.width,h=canvas.height;ctx.clearRect(0,0,w,h);canvas._ink=false;},data(){return canvas._ink?canvas.toDataURL('image/png'):'';},resize};
}
const padMaint=makePad(document.getElementById('sigMaint'));
const padTenant=makePad(document.getElementById('sigTenant'));
function sizePads(){padMaint.resize();padTenant.resize();}
window.addEventListener('load',sizePads);window.addEventListener('orientationchange',()=>setTimeout(sizePads,300));
document.querySelectorAll('[data-clear]').forEach(b=>b.addEventListener('click',()=>{(b.dataset.clear==='sigMaint'?padMaint:padTenant).clear();}));
document.getElementById('tenantUnavail').addEventListener('change',e=>{
  document.getElementById('tenantSigWrap').style.display=e.target.checked?'none':'block';
});

// ---- build print-ready PDF html ----
function fld(v){return v?esc(v):'<span style="color:#999">—</span>';}
function buildPdfHtml(comp){
  const r=REQ||{};
  let sup='';
  comp.supplies.forEach(s=>{sup+='<tr><td>'+esc(s.date)+'</td><td>'+esc(s.item)+'</td><td>'+esc(s.price)+'</td><td>'+esc(s.qty)+'</td><td>'+esc(s.left)+'</td></tr>';});
  for(let i=comp.supplies.length;i<3;i++) sup+='<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
  const sigImg=d=>d?'<img src="'+d+'" style="height:46px">':'<span style="color:#999">—</span>';
  return `<div style="width:740px;padding:24px;font-family:Georgia,serif;color:#15202b;font-size:12px;">
    <table style="width:100%;border-bottom:2px solid #000;padding-bottom:6px;"><tr>
      <td style="font-size:20px;font-weight:bold;">Frontier Housing Corporation</td>
      <td style="text-align:right;font-size:18px;font-weight:bold;">Work Order</td></tr>
      <tr><td style="font-size:10px;">321 Lakeview Drive / P.O. Box 56 &nbsp; Dexter, NY 13634</td>
      <td style="text-align:right;font-size:10px;">Main Office: (315)639-3940 &nbsp; Maintenance: (315)783-3105</td></tr></table>
    <p style="margin:6px 0 2px;font-weight:bold;background:#000;color:#fff;padding:2px 6px;">OCCUPANT</p>
    <table style="width:100%;font-size:12px;"><tr><td>Name: <b>${fld(r.occName)}</b></td><td>Date notified: ${fld(r.dateNotified)}</td></tr>
    <tr><td>Complex/Unit: <b>${fld(r.complexUnit)}</b></td><td>Client Phone: ${fld(r.clientPhone)}</td></tr>
    <tr><td>Pet in residence: ${fld(r.pet)}</td><td>Enter in absence: ${fld(r.entryAuth)}</td></tr>
    <tr><td>By appointment: ${fld(r.byAppt)}</td><td>Appt: ${fld(r.apptDateTime)}</td></tr>
    <tr><td colspan="2">Special info: ${fld(r.specialInfo)}</td></tr></table>
    <p style="margin:6px 0 2px;font-weight:bold;background:#000;color:#fff;padding:2px 6px;">OFFICE</p>
    <table style="width:100%;font-size:12px;"><tr><td>Date Reported: ${fld(r.dateReported)}</td><td>Date Assigned: ${fld(r.dateAssigned)}</td></tr></table>
    <div style="font-size:12px;">Work Requested: <b>${fld(r.workRequested)}</b></div>
    <div style="font-size:12px;">Priority: <b>${fld(r.priority)}</b> &nbsp;&nbsp; Deadline: ${fld(r.workDeadline)}</div>
    <p style="margin:6px 0 2px;font-weight:bold;background:#000;color:#fff;padding:2px 6px;">WORK DONE</p>
    <div style="font-size:12px;min-height:30px;">${fld(comp.workDone)}</div>
    <p style="margin:6px 0 2px;font-weight:bold;background:#000;color:#fff;padding:2px 6px;">SUPPLIES</p>
    <table style="width:100%;border-collapse:collapse;font-size:11px;" border="1" cellpadding="4">
      <tr><th>Date Purchased</th><th>Materials & Parts Used</th><th>Unit Price</th><th>Qty</th><th>Left in Stock</th></tr>${sup}</table>
    <p style="margin:6px 0 2px;font-weight:bold;background:#000;color:#fff;padding:2px 6px;">COMPLETED</p>
    <table style="width:100%;font-size:12px;"><tr><td>Started: ${fld(comp.started)}</td><td>Completed: ${fld(comp.completed)}</td></tr>
    <tr><td colspan="2">Follow-up appt: ${fld(comp.followup)}</td></tr>
    <tr><td>Maintenance: ${sigImg(comp.maintSig)} <br><span style="font-size:10px">${fld(comp.completedBy)}</span></td>
    <td>Tenant: ${comp.tenantUnavail?'<i>Tenant Unavailable</i>':sigImg(comp.tenantSig)}</td></tr>
    <tr><td colspan="2">Approved by: _____________________________  Date: __________</td></tr></table>
  </div>`;
}

// ---- send ----
async function send(){
  const btn=document.getElementById('sendBtn'), msg=document.getElementById('msg');
  if(WEB3FORMS_KEY==="PASTE-YOUR-WEB3FORMS-ACCESS-KEY"){
    msg.className='err'; msg.textContent='Setup needed: the Web3Forms access key hasn’t been added yet. (Office: paste your free key into index.html.)'; return;
  }
  const comp={
    completedBy:document.getElementById('completedBy').value.trim(),
    workDone:document.getElementById('workDone').value.trim(),
    supplies:readSupplies(),
    started:document.getElementById('started').value.trim(),
    completed:document.getElementById('completed').value.trim(),
    followup:document.getElementById('followup').value.trim(),
    tenantUnavail:document.getElementById('tenantUnavail').checked,
    maintSig:padMaint.data(),
    tenantSig:padTenant.data()
  };
  if(!comp.workDone){ msg.className='err'; msg.textContent='Please add a description of the work done before sending.'; return; }
  btn.disabled=true; msg.className='info'; msg.textContent='Building the work order…';
  try{
    const host=document.getElementById('pdfHost'); host.innerHTML=buildPdfHtml(comp);
    const blob=await html2pdf().set({margin:0.4,image:{type:'jpeg',quality:0.95},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'in',format:'letter',orientation:'portrait'}}).from(host.firstChild).outputPdf('blob');
    const unit=(REQ&&REQ.complexUnit)||'Unit';
    const fname='WorkOrder_'+unit.replace(/[^A-Za-z0-9]+/g,'-')+'.pdf';
    msg.textContent='Sending to the office…';
    const fd=new FormData();
    fd.append('access_key',WEB3FORMS_KEY);
    fd.append('subject','Completed Work Order — '+unit+((REQ&&REQ.woNum)?(' (#'+REQ.woNum+')'):''));
    fd.append('from_name','Frontier Work Order');
    fd.append('Unit',unit);
    fd.append('Occupant',(REQ&&REQ.occName)||'');
    fd.append('Priority',(REQ&&REQ.priority)||'');
    fd.append('Work Requested',(REQ&&REQ.workRequested)||'');
    fd.append('Work Done',comp.workDone);
    fd.append('Completed By',comp.completedBy);
    fd.append('Started',comp.started); fd.append('Completed',comp.completed);
    fd.append('attachment',new File([blob],fname,{type:'application/pdf'}));
    const res=await fetch('https://api.web3forms.com/submit',{method:'POST',body:fd});
    const j=await res.json();
    if(j.success){
      msg.className='ok'; msg.innerHTML='✓ Work order sent to the office. You can close this. <br><small>Saved a copy below in case you want it.</small>';
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; a.textContent='Download my copy (PDF)'; a.style.cssText='display:inline-block;margin-top:8px;font-weight:700;color:#2c5f8a;'; msg.appendChild(document.createElement('br')); msg.appendChild(a);
    } else { throw new Error(j.message||'Send failed'); }
  }catch(err){
    msg.className='err'; msg.textContent='Could not send: '+err.message+'. Check signal and try again.'; btn.disabled=false;
  }
}
document.getElementById('sendBtn').addEventListener('click',send);

// ---- register service worker ----
if('serviceWorker' in navigator){ navigator.serviceWorker.register('service-worker.js').catch(()=>{}); }
</script>
</body>
</html>
