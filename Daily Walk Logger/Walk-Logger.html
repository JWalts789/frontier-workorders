<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="theme-color" content="#0B7A3B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="WalkLoggerPWAIcon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Walk Log">
<title>Daily Walk — Today's Loop</title>
<style>
  :root{
    --green-900:#0B7A3B; --green-700:#12A150; --green-100:#C9E7CF;
    --amber:#FFB100; --sunrise:#FF6A2C; --red:#E5392E; --blue:#1B6FA8;
    --ink:#0E1B14; --bg:#F4F8F2; --card:#FFFFFF; --line:#dfe7df;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;scrollbar-width:none;-ms-overflow-style:none;}
  *::-webkit-scrollbar{display:none;}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,system-ui,Arial,sans-serif;color:var(--ink);background:var(--bg);font-size:16px;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;
    background:linear-gradient(rgba(8,22,14,.28),rgba(8,22,14,.50)),url("WalkLoggerBackground.png") center / 100% 100% no-repeat;}
  .wrap{max-width:680px;margin:0 auto;padding:0 12px 92px;}

  /* ---------- HERO ---------- */
  #hero{position:sticky;top:0;z-index:20;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4);padding:12px 16px 14px;
    background:linear-gradient(180deg,#8ECAE6 0%,#12A150 50%,#0B7A3B 100%);overflow:hidden;
    box-shadow:0 3px 12px rgba(11,122,59,.25);}
  #hero .glow{position:absolute;top:-50px;right:-40px;width:180px;height:180px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,177,0,.55),rgba(255,106,44,0) 70%);pointer-events:none;}
  .heroRow{display:flex;align-items:center;justify-content:space-between;gap:10px;position:relative;}
  .streak{text-align:center;min-width:64px;}
  .streak .flame{font-size:26px;display:inline-block;}
  .streak .num{font-size:22px;font-weight:800;margin-left:2px;}
  .streak .best{font-size:10.5px;opacity:.9;font-weight:600;margin-top:-2px;}
  .heroMid{flex:1;text-align:center;}
  .heroMid .date{font-size:13px;font-weight:700;opacity:.95;}
  .heroMid .sub{font-size:13.5px;font-weight:700;margin-top:1px;min-height:18px;}
  .tally{text-align:center;min-width:64px;}
  .tally .num{font-size:24px;font-weight:800;line-height:1;}
  .tally .l{font-size:10.5px;opacity:.9;font-weight:600;}
  /* progress trail */
  .trail{position:relative;height:30px;margin-top:12px;}
  .trail .track{position:absolute;top:14px;left:2px;right:18px;height:4px;border-radius:4px;
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.55) 0 7px,transparent 7px 14px);}
  .trail .fill{position:absolute;top:13px;left:2px;height:6px;border-radius:6px;background:linear-gradient(90deg,#1fc36a,#ffc83d,#ff7a2c);box-shadow:0 0 12px rgba(255,170,40,.9);width:0;transition:width .45s ease;}
  .trail .walker{position:absolute;top:-2px;left:0;font-size:22px;transition:left .45s ease;transform:translateX(-50%) scaleX(-1);}
  .trail .flag{position:absolute;top:2px;right:0;font-size:18px;}
  .trail .lbl{position:absolute;top:30px;left:0;right:0;text-align:center;font-size:11px;opacity:.95;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.45);}

  /* ---------- CHIPS ---------- */
  #chips{display:flex;gap:8px;overflow-x:auto;padding:14px 2px 6px;-webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto;background:linear-gradient(180deg,#8ECAE6 0%,#12A150 55%,#0B7A3B 100%);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.55),0 0 3px rgba(0,0,0,.35);border:1.5px solid rgba(255,255,255,.35);border-radius:14px;padding:8px 11px;min-width:124px;
    box-shadow:0 1px 5px rgba(0,0,0,.12);}
  .chip.sel{border-color:#9affd0;box-shadow:0 0 18px rgba(46,210,135,.95),0 0 7px rgba(46,210,135,.7);}
  .chip .top{display:flex;align-items:center;gap:7px;}
  .chip .dot{width:11px;height:11px;border-radius:50%;background:#c4cdc6;flex:0 0 auto;}
  .chip.visited .dot{background:var(--amber);}
  .chip.clear .dot{background:var(--green-700);}
  .chip .nm{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip .cnt{margin-left:auto;font-size:11px;font-weight:800;background:rgba(255,255,255,.92);color:#0b5a34;text-shadow:none;border-radius:10px;padding:1px 7px;}
  .chip .ac{margin-top:6px;width:100%;background:none;border:0;color:#eafff2;font-size:11.5px;font-weight:700;padding:3px;border-radius:8px;text-align:left;}
  .chip.clear .ac{color:#ffffff;}

  /* ---------- ADD CARD ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 2px 10px rgba(0,0,0,.05);}
  .addcard{border-left:6px solid var(--green-700);background:#8ecae6;}
  .addcard h2{margin:0 0 8px;font-size:15px;font-weight:800;color:var(--green-900);}
  label{display:block;font-size:12.5px;font-weight:700;margin:11px 0 5px;}
  select,input,textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-family:inherit;font-size:16px;color:var(--ink);background:#fff;}
  select{background:#23b97e;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.45);border-color:#1f9e63;font-weight:700;box-shadow:0 0 14px rgba(46,210,135,.6);}
  select option{background:#d6f5e6;color:#0c5a36;text-shadow:none;}
  select option:checked,select option:hover{background:#1e5bd6;color:#fff;}
  .cd{position:relative;}
  .cd-trigger{width:100%;padding:12px;border:1.5px solid #1f9e63;border-radius:12px;background:#23b97e;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.45);font-weight:700;font-size:16px;font-family:inherit;text-align:left;box-shadow:0 0 14px rgba(46,210,135,.6);display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;}
  .cd-arrow{opacity:.9;transition:transform .2s;}
  .cd.open .cd-arrow{transform:rotate(180deg);}
  .cd-menu{position:absolute;z-index:40;left:0;right:0;top:calc(100% + 6px);background:rgba(201,243,221,.82);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1.5px solid rgba(31,158,99,.5);border-radius:16px;box-shadow:0 12px 30px rgba(11,40,25,.30);padding:6px;max-height:260px;overflow:auto;display:none;}
  .cd.open .cd-menu{display:block;animation:pop .16s ease;}
  .cd-opt{padding:11px 12px;border-radius:12px;font-size:15px;font-weight:600;color:#0c5a36;cursor:pointer;}
  .cd-opt:hover,.cd-opt.active{background:#1e5bd6;color:#fff;}
  .cd-opt.sel{box-shadow:inset 0 0 0 2px rgba(31,158,99,.55);}
  #desc{background-color:#fdf7b5;
    background-image:linear-gradient(90deg,transparent 0 40px,#ff9d9d 40px 42px,transparent 42px),repeating-linear-gradient(#fdf7b5,#fdf7b5 27px,#bcd0ef 27px,#bcd0ef 28px);
    background-attachment:local;line-height:28px;min-height:84px;padding:7px 12px 7px 52px;border:1px solid #e6d96a;border-radius:10px;color:#22303a;}
  textarea{min-height:58px;line-height:1.4;resize:vertical;}
  .tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
  .tile{border:1.5px solid var(--line);border-radius:12px;background:#fff;padding:8px 2px;text-align:center;font-size:11px;font-weight:600;line-height:1.2;cursor:pointer;}
  .tile .em{font-size:20px;display:block;}
  .tile.sel{border-color:#2fc97e;background:#c7f3dd;color:#0c5a36;box-shadow:0 0 24px rgba(46,210,135,.95),0 0 9px rgba(46,210,135,.75);}
  .seg{display:flex;gap:6px;}
  .seg button{flex:1;min-height:54px;border:1.5px solid var(--line);background:#fff;border-radius:12px;font-size:14px;font-weight:800;color:var(--ink);}
  .seg button.sel[data-p="Low"]{background:#1e5bd6;border-color:#163f99;color:#fff;box-shadow:0 0 14px rgba(30,91,214,.55);}
  .seg button.sel[data-p="Medium"]{background:#ffcc00;border-color:#e0b400;color:#3a2a00;box-shadow:0 0 14px rgba(255,204,0,.6);}
  .seg button.sel[data-p="High"]{background:#e5392e;border-color:#b3271e;color:#fff;box-shadow:0 0 14px rgba(229,57,46,.55);}
  .addbtn{width:100%;margin-top:14px;background:#2ed287;color:#06402a;border:0;border-radius:14px;padding:16px;font-size:17px;font-weight:800;box-shadow:0 3px 0 #1f9e63;}
  .addbtn:active{transform:translateY(2px);box-shadow:0 1px 0 #1f9e63;}

  /* ---------- CONTROLS ---------- */
  .bar{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 2px;}
  .bar button{flex:1;min-width:96px;background:#1e5bd6;color:#fff;border:1.5px solid #163f99;border-radius:11px;padding:11px;font-size:13.5px;font-weight:700;}
  .count{font-size:12.5px;color:#eef3ee;text-shadow:0 1px 3px rgba(0,0,0,.55);text-align:center;margin:8px 0;font-weight:700;}

  /* ---------- LIST ---------- */
  .grp{margin-top:14px;}
  .grp .gh{display:flex;align-items:center;gap:8px;margin:0 0 6px;}
  .grp .gh h3{margin:0;font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);}
  .ring{width:24px;height:24px;flex:0 0 auto;}
  .item{position:relative;background:var(--card);border:1px solid var(--line);border-left:6px solid #9aa6a0;border-radius:13px;padding:11px 12px;margin:8px 0;display:flex;gap:10px;align-items:flex-start;
    animation:pop .24s cubic-bezier(.2,.9,.3,1.2);}
  .item[data-p="Medium"]{border-left-color:var(--amber);background:#fffdf6;}
  .item[data-p="High"]{border-left-color:var(--red);background:#fff7f6;}
  .item .body{flex:1;min-width:0;}
  .item .tags{font-size:12px;color:#5a6b62;font-weight:600;}
  .item .pri{display:inline-block;font-size:10.5px;font-weight:800;color:#fff;border-radius:10px;padding:0 7px;vertical-align:1px;}
  .pri.Low{background:#8794a1;} .pri.Medium{background:var(--amber);color:#3a2a00;} .pri.High{background:var(--red);}
  .item .desc{font-size:15px;margin-top:3px;word-wrap:break-word;}
  .item.done{opacity:.6;} .item.done .desc{text-decoration:line-through;}
  .check{flex:0 0 auto;width:44px;height:44px;border-radius:50%;border:2px solid var(--green-700);background:#fff;color:var(--green-700);font-size:20px;font-weight:800;}
  .item.done .check{background:var(--green-700);color:#fff;}
  .del{position:absolute;top:8px;right:10px;background:none;border:0;color:#b6312a;font-size:16px;font-weight:800;line-height:1;padding:2px 4px;}
  .empty{text-align:center;color:#f1f6f2;text-shadow:0 1px 5px rgba(0,0,0,.6);padding:34px 12px;font-size:14.5px;font-weight:600;}
  .empty .big{font-size:40px;display:block;margin-bottom:6px;animation:breathe 3s ease-in-out infinite;}

  /* ---------- FINISH BANNER ---------- */
  #finish{display:none;cursor:pointer;margin:14px 0;background:linear-gradient(135deg,var(--green-900),var(--green-700));color:#fff;border-radius:16px;padding:16px;text-align:center;box-shadow:0 4px 14px rgba(11,122,59,.3);}
  #finish.show{display:block;}
  #finish .fl{font-size:30px;} #finish .ft{font-size:17px;font-weight:800;margin-top:2px;} #finish .fs{font-size:13px;opacity:.95;margin-top:2px;}

  /* ---------- CELEBRATION ---------- */
  #celebrate{display:none;position:fixed;inset:0;z-index:60;background:rgba(8,22,14,.55);align-items:center;justify-content:center;padding:24px;}
  #celebrate.show{display:flex;}
  #celebrate .cc{background:#fff;border-radius:22px;padding:26px 22px;max-width:340px;text-align:center;box-shadow:0 18px 50px rgba(0,0,0,.35);animation:popin .4s cubic-bezier(.2,.9,.3,1.3);}
  #celebrate .em{font-size:54px;} #celebrate h3{margin:6px 0 4px;font-size:22px;color:var(--green-900);}
  #celebrate .stats{font-size:15px;font-weight:700;margin:8px 0 4px;}
  #celebrate .sub{font-size:13px;color:#5a6b62;}
  #celebrate button{margin-top:16px;background:var(--green-700);color:#fff;border:0;border-radius:12px;padding:13px 26px;font-size:16px;font-weight:800;}
  #confetti{position:fixed;inset:0;z-index:55;pointer-events:none;display:none;}
  #toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(80px);z-index:70;background:var(--ink);color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;font-weight:700;opacity:0;transition:transform .3s,opacity .3s;max-width:90%;text-align:center;}
  #toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  @keyframes pop{from{opacity:0;transform:translateY(-8px) scale(.97);}to{opacity:1;transform:none;}}
  @keyframes popin{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:none;}}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  @keyframes flicker{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.85;}}
  .flame{animation:flicker 2.4s ease-in-out infinite;}

  /* multi-screen nav */
  .screen{display:none;animation:fade .25s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .screenTitle{font-size:20px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);margin:6px 0 2px;}
  .screenSub{font-size:13px;color:#eef3ee;text-shadow:0 1px 3px rgba(0,0,0,.5);margin:0 0 12px;font-weight:600;}
  .tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;background:rgba(255,255,255,.96);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-top:1px solid var(--line);box-shadow:0 -3px 14px rgba(0,0,0,.10);}
  .tab{flex:1;background:none;border:0;padding:8px 4px 9px;font-size:11px;font-weight:700;color:#7a8a80;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
  .tab .ti{font-size:21px;transition:transform .2s;}
  .tab.active{color:var(--green-900);}
  .tab.active .ti{transform:scale(1.15);filter:drop-shadow(0 0 6px rgba(46,210,135,.75));}
  /* busy work legal pad */
  #busyPad{background-color:rgba(201,243,221,.78);background-image:linear-gradient(90deg,transparent 0 46px,rgba(229,57,46,.5) 46px 48px,transparent 48px);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);border:1.5px solid rgba(46,210,135,.55);border-radius:14px;box-shadow:0 0 22px rgba(46,210,135,.55),0 6px 18px rgba(0,0,0,.18);padding:6px 14px 10px 58px;min-height:220px;}
  .task{position:relative;min-height:48px;padding:8px 0;display:flex;flex-direction:column;justify-content:center;border-bottom:1px solid rgba(31,158,99,.28);}
  .task .box{position:absolute;left:-46px;top:50%;transform:translateY(-50%);width:26px;height:26px;border:2.5px solid #2b7a4d;border-radius:6px;background:#f3fff9;cursor:pointer;}
  .task .box:hover{box-shadow:0 0 10px rgba(46,210,135,.65);background:#eafff2;}
  .task .tx{line-height:1.35;color:#23303a;padding-top:1px;}
  .task .meta2{font-size:11.5px;color:#3f6b53;}
  .task .pri{display:inline-block;font-size:10px;font-weight:800;color:#fff;border-radius:9px;padding:0 6px;vertical-align:1px;}
  .busyEmpty{text-align:center;color:#1f6b48;padding:46px 10px;font-size:15px;font-weight:700;}
  .busyHead{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .busyFilters{display:flex;gap:6px;flex-wrap:wrap;}
  .fsel{width:auto;max-width:128px;padding:6px 9px;font-size:12px;font-weight:700;border-radius:10px;box-shadow:0 0 8px rgba(46,210,135,.45);}
  .busyFilters .cd{flex:0 0 auto;}
  .busyFilters .cd-trigger{width:auto;max-width:150px;padding:7px 10px;font-size:12px;gap:6px;border-radius:12px;box-shadow:0 0 9px rgba(46,210,135,.45);}
  .busyFilters .cd-trigger .cd-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .busyFilters .cd-menu{right:auto;min-width:165px;}
  /* task history */
  #historyStats{display:flex;gap:10px;margin-bottom:8px;}
  .hstat{flex:1;background:rgba(255,255,255,.93);border-radius:12px;padding:12px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.10);}
  .hstat .n{font-size:24px;font-weight:800;color:var(--green-900);}
  .hstat .l{font-size:10.5px;color:#5a6b62;font-weight:700;}
  .hday{margin-top:14px;}
  .hday h4{margin:0 0 6px;font-size:13px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .hitem{background:rgba(255,255,255,.95);border-left:5px solid var(--green-700);border-radius:10px;padding:9px 12px;margin:7px 0;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .hitem .ht{font-size:14px;color:#22303a;}
  .hitem .hm{font-size:11.5px;color:#5a6b62;margin-top:1px;}
  .hitem .undo{background:none;border:0;color:#1b6fa8;font-weight:700;font-size:12px;cursor:pointer;flex:0 0 auto;}
  .histEmpty{text-align:center;color:#f1f6f2;text-shadow:0 1px 4px rgba(0,0,0,.5);padding:46px 10px;font-size:15px;font-weight:700;}
  /* confirm modal */
  .modal{display:none;position:fixed;inset:0;z-index:65;background:rgba(8,22,14,.55);align-items:center;justify-content:center;padding:24px;}
  .modal.show{display:flex;}
  .mbox{background-color:#fdf7b5;background-image:repeating-linear-gradient(#fdf7b5,#fdf7b5 27px,#bcd0ef 27px,#bcd0ef 28px);border:1px solid #e6d96a;border-radius:16px;padding:20px 18px;max-width:330px;box-shadow:0 18px 50px rgba(0,0,0,.4);}
  .mtitle{font-weight:800;font-size:17px;color:#9b1c14;text-align:center;}
  .mtask{font-size:15px;color:#23303a;text-align:center;margin:10px 6px 2px;line-height:1.4;font-style:italic;}
  .mbtns{display:flex;gap:10px;margin-top:16px;}
  .mbtns button{flex:1;border:0;border-radius:11px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;}
  .mcancel{background:#fff;color:#5a6b62;border:1.5px solid #cfd8d2 !important;}
  .mok{background:#2ed287;color:#06402a;box-shadow:0 3px 0 #1f9e63;}
  #printHead{display:none;}
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  @media print{
    #hero,#chips,.addcard,.bar,.count,#finish,#celebrate,#confetti,#toast,.check,.del,.ring{display:none!important;}
    .tabbar,.modal,#screenBusy,#screenHistory{display:none!important;} #screenWalk{display:block!important;}
    body::before{display:none!important;}
    h3{color:#000!important;text-shadow:none!important;}
    body{background:#fff;} .wrap{max-width:none;padding:0;}
    #printHead{display:block;font-size:18px;margin:0 0 8px;}
    .item{break-inside:avoid;border:1px solid #bbb;border-left:3px solid #888;background:#fff!important;opacity:1!important;}
    .item .desc{text-decoration:none!important;}
  }
</style>
</head>
<body>

<header id="hero">
  <div class="glow"></div>
  <div class="heroRow">
    <div class="streak"><span class="flame" id="flame">🔥</span><span class="num" id="streakNum">0</span><div class="best" id="bestTxt">&nbsp;</div></div>
    <div class="heroMid"><div class="date" id="dateTxt"></div><div class="sub" id="subtitle"></div></div>
    <div class="tally"><div class="num" id="spotN">0</div><div class="l">spotted</div></div>
  </div>
  <div class="trail">
    <div class="track"></div><div class="fill" id="trailFill"></div>
    <div class="walker" id="walker">🚶</div><div class="flag">🏁</div>
    <div class="lbl" id="trailLbl"></div>
  </div>
</header>

<div class="wrap">
  <section id="screenWalk" class="screen active">
  <div id="chips"></div>

  <div class="card addcard">
    <h2>Spot an issue 👀</h2>
    <label>Property</label>
    <select id="building">
      <option>Poole Memorial</option><option>Smith Hill</option><option>Memorial</option><option>West Kirby St</option><option>Grounds / Other</option>
    </select>
    <label>Unit / area (optional)</label>
    <select id="areaSel"></select>
    <input type="text" id="area" placeholder="Type unit or area, e.g. C-3, hallway, parking lot" style="display:none;margin-top:6px;">
    <label>Category</label>
    <div class="tiles" id="tiles"></div>
    <label>Priority</label>
    <div class="seg" id="seg">
      <button data-p="Low">Low</button><button data-p="Medium" class="sel">Med</button><button data-p="High">High</button>
    </div>
    <label>What did you see?</label>
    <textarea id="desc" placeholder="Short description…"></textarea>
    <button class="addbtn" id="addBtn">+ Spot it</button>
  </div>

  <div class="bar">
    <button id="printBtn">🖨 Punch list</button>
    <button id="histBtn">Past walks</button>
    <button id="clearBtn">Clear today</button>
  </div>
  <div class="count" id="count"></div>

  <div id="finish"><div class="fl">🏁</div><div class="ft">Loop complete!</div><div class="fs" id="finishSub"></div></div>

  <h2 id="printHead">Daily Walk Punch List</h2>
  <div id="list"></div>
  </section>

  <section id="screenBusy" class="screen">
    <div class="busyHead">
      <h2 class="screenTitle">📋 Busy Work</h2>
      <div class="busyFilters">
        <select id="fProp" class="fsel"><option value="">All properties</option><option>Poole Memorial</option><option>Smith Hill</option><option>Memorial</option><option>West Kirby St</option><option>Grounds / Other</option></select>
        <select id="fPri" class="fsel"><option value="">Any priority</option><option>High</option><option>Medium</option><option>Low</option></select>
        <select id="fCat" class="fsel"><option value="">Any category</option><option>Plumbing</option><option>Electrical</option><option>Grounds</option><option>Safety</option><option>Cleaning</option><option>Structural</option><option>Appliance</option><option>Pest</option><option>Other</option></select>
      </div>
    </div>
    <p class="screenSub">Open tasks from your walks — tap a box to check one off.</p>
    <div id="busyPad"></div>
  </section>

  <section id="screenHistory" class="screen">
    <h2 class="screenTitle">📜 Task History</h2>
    <p class="screenSub">Everything you've knocked out. Look how far you've come!</p>
    <div id="historyStats"></div>
    <div id="historyList"></div>
  </section>
</div>

<nav class="tabbar">
  <button class="tab active" data-s="0"><span class="ti">🚶</span>Walk</button>
  <button class="tab" data-s="1"><span class="ti">📋</span>Busy Work</button>
  <button class="tab" data-s="2"><span class="ti">📜</span>History</button>
</nav>

<div id="confirmModal" class="modal"><div class="mbox">
  <div class="mtitle">Confirm Task Is Complete</div>
  <div class="mtask" id="confirmText"></div>
  <div class="mbtns"><button class="mcancel" id="confirmCancel">Cancel</button><button class="mok" id="confirmOk">✓ Complete</button></div>
</div></div>

<div id="celebrate"><div class="cc"><div class="em">🎉</div><h3>Great walk!</h3><div class="stats" id="celStats"></div><div class="sub" id="celSub"></div><button id="celBtn">Done</button></div></div>
<canvas id="confetti"></canvas>
<div id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const LOOP=['Poole Memorial','Smith Hill','Memorial','West Kirby St'];
const ALLPROPS=LOOP.concat(['Grounds / Other']);
const CATS=[['Plumbing','🚰'],['Electrical','⚡'],['Grounds','🌿'],['Safety','🛡️'],['Cleaning','🧹'],['Structural','🧱'],['Appliance','🧊'],['Pest','🐜'],['Other','•••']];
const SUBS=['Fresh route ahead — let\'s spot some wins.','New day, clean slate. 🚶','Today\'s Loop — let\'s walk it.'];
const AREA_OPTS={
  'Poole Memorial':['Building A','Building B','Building C','Building D','Building E','Building F'],
  'Smith Hill':['Building A','Building B','Building C','Building D','Building E'],
  'Memorial':[],
  'West Kirby St':['301','303','307','309','313','315'],
  'Grounds / Other':[]
};
function buildAreaOptions(){
  const list=AREA_OPTS[$('building').value]||[];
  let h='<option value="">— optional area —</option><option>Whole property</option>';
  list.forEach(o=>h+='<option>'+o+'</option>');
  h+='<option value="__other">Other…</option>';
  $('areaSel').innerHTML=h; $('area').style.display='none'; $('area').value=''; cdRefresh('areaSel');
}

// ---------- custom dropdown (styled menu over a hidden native select) ----------
function cdInit(id){
  const sel=$(id); sel.style.display='none';
  const cd=document.createElement('div'); cd.className='cd'; cd.id='cd-'+id;
  cd.innerHTML='<button type="button" class="cd-trigger"><span class="cd-label"></span><span class="cd-arrow">▾</span></button><div class="cd-menu"></div>';
  sel.parentNode.insertBefore(cd,sel.nextSibling);
  cd.querySelector('.cd-trigger').addEventListener('click',e=>{e.stopPropagation();const o=cd.classList.contains('open');closeAllCd();if(!o)cd.classList.add('open');});
  cdRefresh(id);
}
function cdRefresh(id){
  const sel=$(id),cd=$('cd-'+id); if(!cd)return;
  const menu=cd.querySelector('.cd-menu'); menu.innerHTML='';
  [].forEach.call(sel.options,o=>{
    const d=document.createElement('div'); d.className='cd-opt'; d.textContent=o.textContent; d.dataset.val=o.value;
    d.addEventListener('click',ev=>{ev.stopPropagation();sel.value=o.value;sel.dispatchEvent(new Event('change'));cdSync(id);cd.classList.remove('open');});
    menu.appendChild(d);
  });
  cdSync(id);
}
function cdSync(id){
  const sel=$(id),cd=$('cd-'+id); if(!cd)return;
  const opt=sel.options[sel.selectedIndex];
  cd.querySelector('.cd-label').textContent=opt?opt.textContent:'';
  [].forEach.call(cd.querySelectorAll('.cd-opt'),d=>d.classList.toggle('sel',d.dataset.val===sel.value));
}
function closeAllCd(){[].forEach.call(document.querySelectorAll('.cd.open'),c=>c.classList.remove('open'));}
document.addEventListener('click',closeAllCd);

let items=[]; try{items=JSON.parse(localStorage.getItem('walkLog_v1')||'[]');}catch(e){items=[];}
let game={streak:{lastDay:'',count:0,best:0},clears:{},celebrated:{}};
try{game=Object.assign(game,JSON.parse(localStorage.getItem('walkGame_v1')||'{}'));}catch(e){}
game.clears=game.clears||{}; game.celebrated=game.celebrated||{}; game.streak=game.streak||{lastDay:'',count:0,best:0};

let curCat='Plumbing', curPri='Medium', filterProp=null, showAll=false;

function saveItems(){localStorage.setItem('walkLog_v1',JSON.stringify(items));}
function saveGame(){localStorage.setItem('walkGame_v1',JSON.stringify(game));}
function pad(n){return ('0'+n).slice(-2);}
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function today(){return dstr(new Date());}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return dstr(d);}
function pretty(s){const p=s.split('-');return p[1]+'/'+p[2]+'/'+p[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function nowTime(){return new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});}
function todayItems(){const t=today();return items.filter(x=>x.date===t);}
function clearsToday(){return game.clears[today()]||[];}

function bumpStreak(){
  const t=today(); if(game.streak.lastDay===t) return false;
  if(game.streak.lastDay===yesterday()) game.streak.count+=1; else game.streak.count=1;
  game.streak.best=Math.max(game.streak.best||0,game.streak.count);
  game.streak.lastDay=t; saveGame(); return true;
}

function coveredProps(){
  const t=today(), set=new Set();
  items.forEach(x=>{ if(x.date===t && LOOP.includes(x.building)) set.add(x.building); });
  clearsToday().forEach(p=>{ if(LOOP.includes(p)) set.add(p); });
  return set;
}
function propState(p){
  const t=today();
  const its=items.filter(x=>x.date===t && x.building===p);
  const visited = its.length>0 || clearsToday().includes(p);
  const open = its.filter(x=>!x.done).length;
  return {visited, open, done: visited && open===0};
}

// ---------- build static UI ----------
(function(){
  $('tiles').innerHTML=CATS.map(c=>`<div class="tile${c[0]===curCat?' sel':''}" data-c="${c[0]}"><span class="em">${c[1]}</span>${c[0]}</div>`).join('');
  $('tiles').querySelectorAll('.tile').forEach(t=>t.addEventListener('click',()=>{curCat=t.dataset.c;$('tiles').querySelectorAll('.tile').forEach(x=>x.classList.toggle('sel',x===t));}));
  $('seg').querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{curPri=b.dataset.p;$('seg').querySelectorAll('button').forEach(x=>x.classList.toggle('sel',x===b));}));
  $('areaSel').addEventListener('change',e=>{const c=e.target.value==='__other';$('area').style.display=c?'block':'none';if(c)$('area').focus();});
  $('building').addEventListener('change',buildAreaOptions);
  buildAreaOptions();
  cdInit('building'); cdInit('areaSel'); cdInit('fProp'); cdInit('fPri'); cdInit('fCat');
})();

function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

// ---------- add ----------
function add(){
  const desc=$('desc').value.trim();
  if(!desc){$('desc').focus();$('desc').style.borderColor='var(--red)';return;}
  $('desc').style.borderColor='';
  const newDay=bumpStreak();
  const areaVal=$('areaSel').value==='__other'?$('area').value.trim():$('areaSel').value;
  items.push({id:uid(),date:today(),building:$('building').value,area:areaVal,cat:curCat,pri:curPri,desc,done:false,time:nowTime()});
  saveItems();
  $('desc').value='';$('area').value='';$('areaSel').value='';$('area').style.display='none';cdSync('areaSel');
  render(); $('desc').focus();
  const n=todayItems().length;
  toast('Nice eyes! '+n+' spotted today.');
  if(newDay) flameFlare();
  checkLoop();
}
function allClear(p){
  const t=today(); const arr=game.clears[t]||[];
  if(arr.includes(p)){ game.clears[t]=arr.filter(x=>x!==p); }
  else { game.clears[t]=arr.concat([p]); const nd=bumpStreak(); toast(p+': all clear ✓'); if(nd) flameFlare(); }
  saveGame(); render(); checkLoop();
}
function completeItem(id,btn){
  const it=items.find(x=>x.id===id); if(!it||it.done)return;
  it.done=true; it.doneAt=Date.now(); saveItems();
  if(btn){const r=btn.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,18);} else {burst(innerWidth/2,innerHeight*0.42,18);}
  if(navigator.vibrate)navigator.vibrate(15);
  render(); checkLoop();
}
function reopenItem(id){
  const it=items.find(x=>x.id===id); if(!it)return;
  it.done=false; it.doneAt=null; saveItems(); render(); checkLoop();
}
function toggle(id,btn){
  const it=items.find(x=>x.id===id); if(!it)return;
  it.done?reopenItem(id):completeItem(id,btn);
}
function del(id){items=items.filter(x=>x.id!==id);saveItems();render();}

function flameFlare(){const f=$('flame');f.style.transition='transform .3s';f.style.transform='scale(1.6)';setTimeout(()=>f.style.transform='',320);}

// ---------- render ----------
function render(){
  renderBusy(); renderHistory();
  const t=today();
  // hero
  $('dateTxt').textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
  $('streakNum').textContent=game.streak.count||0;
  $('bestTxt').textContent=(game.streak.best?('Best: '+game.streak.best):' ');
  const spotted=todayItems().length; $('spotN').textContent=spotted;
  const cov=coveredProps().size;
  $('trailFill').style.width=(cov/LOOP.length*100)+'%';
  $('walker').style.left=(cov/LOOP.length*100)+'%';
  $('trailLbl').textContent=cov+' / '+LOOP.length+' properties walked';
  // subtitle (contextual)
  let sub;
  if(cov>=LOOP.length) sub='Loop complete — nice work! 🏁';
  else if(spotted===0 && cov===0) sub='Fresh morning — enjoy the walk. 🚶';
  else sub=(LOOP.length-cov)+' propert'+((LOOP.length-cov)===1?'y':'ies')+' to go — keep rolling!';
  $('subtitle').textContent=sub;

  // chips
  $('chips').innerHTML=LOOP.map(p=>{
    const st=propState(p), isLoop=LOOP.includes(p);
    const cls=st.done?'clear':(st.visited?'visited':'');
    const open=items.filter(x=>x.date===t&&x.building===p&&!x.done).length;
    return `<div class="chip ${cls} ${filterProp===p?'sel':''}" data-p="${esc(p)}">
      <div class="top"><span class="dot"></span><span class="nm">${esc(p)}</span>${open?`<span class="cnt">${open}</span>`:''}</div>
      ${isLoop?`<button class="ac" data-ac="${esc(p)}">${clearsToday().includes(p)?'✓ Marked clear':'All clear here ✓'}</button>`:''}
    </div>`;
  }).join('');
  $('chips').querySelectorAll('.chip').forEach(c=>c.addEventListener('click',e=>{
    if(e.target.classList.contains('ac')){ allClear(e.target.dataset.ac); return; }
    const p=c.dataset.p; filterProp=(filterProp===p?null:p);
    if(filterProp){ $('building').value=p; buildAreaOptions(); cdSync('building'); } render();
  }));

  // count line
  const openToday=todayItems().filter(x=>!x.done).length;
  $('count').textContent= showAll ? (items.length+' issues across all days') : (openToday+' open · '+(spotted-openToday)+' done today');
  $('histBtn').textContent=showAll?'Today only':'Past walks';

  // finish banner
  const loopDone=cov>=LOOP.length;
  $('finish').classList.toggle('show',loopDone && !showAll);
  if(loopDone){$('finishSub').textContent=spotted+' spotted · '+(game.streak.count)+'-day streak kept · tap to replay 🎉';}

  // list
  let shown = showAll ? items.slice() : todayItems();
  if(filterProp) shown=shown.filter(x=>x.building===filterProp);
  if(!shown.length){
    $('list').innerHTML='<div class="empty"><span class="big">🚶</span>'+(showAll?'No issues logged yet.':(filterProp?('Nothing logged at '+esc(filterProp)+' today.'):'Fresh morning — nothing logged yet. Enjoy the walk.'))+'</div>';
    return;
  }
  const byDate={}; shown.forEach(x=>{(byDate[x.date]=byDate[x.date]||[]).push(x);});
  let html='';
  Object.keys(byDate).sort().reverse().forEach(dt=>{
    if(showAll) html+='<h3 style="color:#eef3ee;text-shadow:0 1px 3px rgba(0,0,0,.5);font-size:13px;margin:16px 0 4px;">'+pretty(dt)+'</h3>';
    const byB={}; byDate[dt].forEach(x=>{(byB[x.building]=byB[x.building]||[]).push(x);});
    ALLPROPS.concat(Object.keys(byB).filter(b=>!ALLPROPS.includes(b))).forEach(b=>{
      if(!byB[b])return;
      const open=byB[b].filter(x=>!x.done).length, done=byB[b].length-open, frac=byB[b].length?done/byB[b].length:0;
      html+='<div class="grp"><div class="gh">'+ring(frac)+'<h3>'+esc(b)+'</h3></div>';
      byB[b].forEach(it=>{
        html+=`<div class="item${it.done?' done':''}" data-p="${it.pri}">
          <div class="body">
            <div class="tags"><span class="pri ${it.pri}">${it.pri}</span> <b>${esc(it.cat)}</b>${it.area?(' · '+esc(it.area)):''} · ${esc(it.time)}</div>
            <div class="desc">${esc(it.desc)}</div>
          </div>
          <button class="check" data-id="${it.id}">${it.done?'✓':'○'}</button>
          <button class="del" data-del="${it.id}">✕</button>
        </div>`;
      });
      html+='</div>';
    });
  });
  $('list').innerHTML=html;
  $('list').querySelectorAll('.check').forEach(b=>b.addEventListener('click',()=>toggle(b.dataset.id,b)));
  $('list').querySelectorAll('.del').forEach(b=>b.addEventListener('click',()=>del(b.dataset.del)));
}
function ring(frac){
  const r=9,c=2*Math.PI*r,off=c*(1-frac);
  return `<svg class="ring" viewBox="0 0 24 24"><circle cx="12" cy="12" r="${r}" fill="none" stroke="#dfe7df" stroke-width="3"/><circle cx="12" cy="12" r="${r}" fill="none" stroke="#12A150" stroke-width="3" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 12 12)"/></svg>`;
}

// ---------- loop celebration ----------
function checkLoop(){
  const t=today(), complete=coveredProps().size>=LOOP.length;
  if(complete && !game.celebrated[t]){ game.celebrated[t]=true; saveGame(); celebrate(); }
  else if(!complete && game.celebrated[t]){ game.celebrated[t]=false; saveGame(); }
}
function celebrate(){
  const spotted=todayItems().length;
  $('celStats').textContent=LOOP.length+'/'+LOOP.length+' properties · '+spotted+' spotted';
  $('celSub').textContent=(game.streak.count)+'-day streak kept! '+(spotted===0?'Light day? Still counts — walk banked.':'See you tomorrow.');
  $('celebrate').classList.add('show');
  finale();
}
$('celBtn').addEventListener('click',()=>$('celebrate').classList.remove('show'));

// ---------- confetti ----------
const cv=$('confetti'); let ctx, parts=[], raf=null;
function fit(){cv.width=innerWidth;cv.height=innerHeight;}
function spawn(x,y,n,spread,up){for(let i=0;i<n;i++){const a=(-Math.PI/2)+(Math.random()-.5)*spread;const s=4+Math.random()*(up||7);parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(up||3),g:.22,life:1,col:['#12A150','#FFB100','#FF6A2C','#1B6FA8','#E5392E'][i%5],sz:4+Math.random()*4,rot:Math.random()*6});}}
function loop(){ctx.clearRect(0,0,cv.width,cv.height);let alive=false;parts.forEach(p=>{if(p.life<=0)return;alive=true;p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.life-=.012;p.rot+=.2;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*.6);ctx.restore();});if(alive){raf=requestAnimationFrame(loop);}else{cv.style.display='none';cancelAnimationFrame(raf);raf=null;parts=[];}}
function start(){if(window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches)return;cv.style.display='block';fit();ctx=cv.getContext('2d');if(!raf)loop();}
function burst(x,y,n){start();if(cv.style.display==='none')return;spawn(x,y,n,1.6,5);}
function finale(){start();if(cv.style.display==='none')return;for(let k=0;k<6;k++)spawn(innerWidth*(0.1+0.16*k),-10,30,2.6,3);setTimeout(()=>{start();if(cv.style.display==='none')return;for(let k=0;k<6;k++)spawn(innerWidth*(0.18+0.13*k),-10,26,2.6,4);},500);}

// ---------- screens: Busy Work + Task History ----------
function renderBusy(){
  const pad_=$('busyPad'); if(!pad_)return;
  const ord={High:0,Medium:1,Low:2};
  const fp=($('fProp')||{}).value||'', fpr=($('fPri')||{}).value||'', fc=($('fCat')||{}).value||'';
  const anyFilter=fp||fpr||fc;
  let open=items.filter(x=>!x.done);
  if(fp) open=open.filter(x=>x.building===fp);
  if(fpr) open=open.filter(x=>x.pri===fpr);
  if(fc) open=open.filter(x=>x.cat===fc);
  open.sort((a,b)=>(ord[a.pri]-ord[b.pri])||(a.date<b.date?-1:1));
  if(!open.length){ pad_.innerHTML='<div class="busyEmpty">'+(anyFilter?'No tasks match these filters.':'✅ All caught up — no busy work!<br><small>Issues you spot on your walk land here.</small>')+'</div>'; return; }
  pad_.innerHTML=open.map(it=>{
    const loc=[it.building,it.area].filter(Boolean).join(' · ');
    return '<div class="task"><div class="box" data-id="'+it.id+'"></div><div class="tx"><span class="pri '+it.pri+'">'+it.pri+'</span> '+esc(it.desc)+'<div class="meta2">'+esc(loc)+'</div></div></div>';
  }).join('');
  pad_.querySelectorAll('.box').forEach(b=>b.addEventListener('click',()=>askConfirm(b.dataset.id)));
}
function renderHistory(){
  const sl=$('historyList'); if(!sl)return;
  const done=items.filter(x=>x.done).sort((a,b)=>(b.doneAt||0)-(a.doneAt||0));
  const wk=done.filter(x=>(x.doneAt||0)>=Date.now()-7*864e5).length;
  $('historyStats').innerHTML='<div class="hstat"><div class="n">'+done.length+'</div><div class="l">Total done</div></div><div class="hstat"><div class="n">'+wk+'</div><div class="l">This week</div></div><div class="hstat"><div class="n">'+(game.streak.best||0)+'</div><div class="l">Best streak</div></div>';
  if(!done.length){ sl.innerHTML='<div class="histEmpty">No completed tasks yet —<br>knock some out and watch this grow! 💪</div>'; return; }
  const byDay={};
  done.forEach(x=>{ let k='Earlier'; if(x.doneAt){const d=new Date(x.doneAt);k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());} (byDay[k]=byDay[k]||[]).push(x); });
  let html='';
  Object.keys(byDay).sort().reverse().forEach(k=>{
    html+='<div class="hday"><h4>'+(k==='Earlier'?'Earlier':pretty(k))+'</h4>';
    byDay[k].forEach(it=>{ const loc=[it.building,it.area].filter(Boolean).join(' · '); const tm=it.doneAt?new Date(it.doneAt).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'';
      html+='<div class="hitem"><div><div class="ht">✓ '+esc(it.desc)+'</div><div class="hm">'+esc(loc)+(tm?(' · '+tm):'')+'</div></div><button class="undo" data-id="'+it.id+'">undo</button></div>'; });
    html+='</div>';
  });
  sl.innerHTML=html;
  sl.querySelectorAll('.undo').forEach(b=>b.addEventListener('click',()=>reopenItem(b.dataset.id)));
}
let pendingId=null;
function askConfirm(id){const it=items.find(x=>x.id===id);if(!it)return;pendingId=id;$('confirmText').textContent='“'+it.desc+'”';$('confirmModal').classList.add('show');}
$('confirmOk').addEventListener('click',()=>{if(pendingId)completeItem(pendingId);pendingId=null;$('confirmModal').classList.remove('show');});
$('confirmCancel').addEventListener('click',()=>{pendingId=null;$('confirmModal').classList.remove('show');});
$('confirmModal').addEventListener('click',e=>{if(e.target.id==='confirmModal'){pendingId=null;$('confirmModal').classList.remove('show');}});
let curScreen=0;
function showScreen(i){curScreen=Math.max(0,Math.min(2,i));['screenWalk','screenBusy','screenHistory'].forEach((id,idx)=>$(id).classList.toggle('active',idx===curScreen));document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===curScreen));window.scrollTo(0,0);}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>showScreen(+t.dataset.s)));
let tsx=0,tsy=0;
document.addEventListener('touchstart',e=>{tsx=e.changedTouches[0].clientX;tsy=e.changedTouches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5)showScreen(curScreen+(dx<0?1:-1));},{passive:true});

// ---------- controls ----------
$('addBtn').addEventListener('click',add);
$('printBtn').addEventListener('click',()=>window.print());
$('histBtn').addEventListener('click',()=>{showAll=!showAll;filterProp=null;render();});
$('clearBtn').addEventListener('click',()=>{if(confirm("Clear today's list? (Past days are kept.)")){const t=today();items=items.filter(x=>x.date!==t);saveItems();render();}});
$('finish').addEventListener('click',celebrate);
['fProp','fPri','fCat'].forEach(id=>{const el=$(id);if(el)el.addEventListener('change',renderBusy);});
